name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tasks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/tasks_test?sslmode=disable
      JWT_SECRET: ci-secret-must-be-at-least-32-bytes-long-aaaa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
      - name: gofmt
        run: |
          DIFF=$(gofmt -l .)
          if [ -n "$DIFF" ]; then
            echo "::error::gofmt found issues in:"
            echo "$DIFF"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m
      - name: build
        run: go build ./...
      - name: test (race + coverage)
        run: go test -race -count=1 -covermode=atomic -coverprofile=cover.out ./...
      - name: coverage summary
        run: go tool cover -func=cover.out | tail -1

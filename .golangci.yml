version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: internal/repository/pg/sqlc/
        linters:
          - errcheck
          - staticcheck
          - unused

formatters:
  enable:
    - gofmt

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasks"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@postgres:5432/tasks?sslmode=disable
      - up
    restart: "no"

  api:
    build:
      context: .
      args:
        VERSION: dev
        GIT_SHA: local
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tasks?sslmode=disable
      JWT_SECRET: change-me-to-a-secret-that-is-at-least-32-bytes-long
      JWT_TTL: 15m
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
      ENV: production
      PORT: "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
